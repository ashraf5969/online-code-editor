<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CodeMaster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .dark-mode {
            background-color: #121212;
            color: #ffffff;
        }
        .dark-mode .card {
            background-color: #1e1e1e;
            color: #ffffff;
            border-color: #333;
        }
        .dark-mode .navbar {
            background-color: #1e1e1e !important;
            border-bottom: 1px solid #333;
        }
        .dark-mode .text-muted {
            color: #adb5bd !important;
        }
        .dark-mode .table {
            color: #ffffff;
        }
        .dark-mode .table-hover tbody tr:hover {
            color: #ffffff;
            background-color: #2c2c2c;
        }
        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.2;
            position: absolute;
            right: 20px;
            top: 20px;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #007acc;
        }
    </style>
</head>
<body class="dark-mode">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-3">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fas fa-code text-primary"></i> CodeMaster
        </a>
        <div class="ms-auto d-flex align-items-center">
            <a href="index.html" class="btn btn-primary me-2"><i class="fas fa-plus"></i> New Snippet</a>
            <button id="logout-btn" class="btn btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="container py-5">
        <div class="row g-4">
            
            <!-- Left Column: Profile Card -->
            <div class="col-lg-4">
                <div class="card h-100 shadow-sm border-0 position-relative">
                    <div class="card-body text-center mt-4">
                        <img id="user-avatar" src="https://via.placeholder.com/100" alt="Profile" class="profile-img mb-3">
                        <h4 id="user-name" class="card-title fw-bold mb-1">Loading...</h4>
                        <p id="user-email" class="text-muted small mb-3">loading@example.com</p>
                        <span id="user-role" class="badge bg-primary rounded-pill px-3 py-2">Member</span>
                        
                        <hr class="my-4 border-secondary">
                        
                        <div class="d-flex justify-content-between text-center px-2">
                            <div>
                                <h5 id="total-snippets-sm" class="fw-bold mb-0">0</h5>
                                <small class="text-muted">Snippets</small>
                            </div>
                            <div>
                                <h5 id="total-favorites-sm" class="fw-bold mb-0">0</h5>
                                <small class="text-muted">Favorites</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Statistics & Activity -->
            <div class="col-lg-8">
                <div class="row g-4 mb-4">
                    <!-- Stat Card 1 -->
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 bg-primary text-white h-100 position-relative overflow-hidden">
                            <div class="card-body p-4">
                                <h6 class="text-uppercase fw-semibold mb-2">Total Snippets</h6>
                                <h2 id="stat-total" class="display-4 fw-bold mb-0">0</h2>
                                <i class="fas fa-file-code stat-icon"></i>
                            </div>
                        </div>
                    </div>
                    <!-- Stat Card 2 -->
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 bg-success text-white h-100 position-relative overflow-hidden">
                            <div class="card-body p-4">
                                <h6 class="text-uppercase fw-semibold mb-2">Favorited Snippets</h6>
                                <h2 id="stat-favorites" class="display-4 fw-bold mb-0">0</h2>
                                <i class="fas fa-star stat-icon"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Recent Activity Table -->
                    <div class="col-md-12">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-4"><i class="fas fa-history text-primary"></i> Recent Activity</h5>
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>Title</th>
                                                <th>Language</th>
                                                <th>Created</th>
                                                <th class="text-end">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="recent-snippets-table">
                                            <tr>
                                                <td colspan="4" class="text-center py-4 text-muted">Loading snippets...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Favorites Row -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-4"><i class="fas fa-star text-warning"></i> Quick Access: Favorites</h5>
                        <div class="row g-3" id="favorites-grid">
                            <!-- Favorite items will stick here -->
                            <div class="col-12 text-center py-3 text-muted">Loading favorites...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Module scripts -->
    <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
